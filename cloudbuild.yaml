steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/workspace-mila', './backend']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/workspace-mila']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'workspace-mila'
      - '--image'
      - 'gcr.io/$PROJECT_ID/workspace-mila'
      - '--region'
      - 'southamerica-east1'
      - '--allow-unauthenticated'
